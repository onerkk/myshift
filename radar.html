<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>即時雷達 · 我頭上的雨</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --ink:#070b14; --panel:rgba(16,23,38,.86); --panel-solid:#101726;
    --line:#26344f; --tx:#e9f0fb; --tx2:#93a6c4; --tx3:#5f718f;
    --now:#37d6ef;      /* 即時 / 你的位置 */
    --fore:#f6a723;     /* 預報 */
    --bad:#ff5a6e;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--ink);color:var(--tx);font-family:var(--sans);overflow:hidden}
  #map{position:fixed;inset:0;background:var(--ink);z-index:0}

  /* 頂部：地點 + 即時判讀 */
  .top{position:fixed;top:0;left:0;right:0;z-index:1000;padding:max(10px,env(safe-area-inset-top)) 12px 0;
    pointer-events:none;display:flex;justify-content:center}
  .topcard{pointer-events:auto;width:100%;max-width:520px;background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);
    border-radius:16px;padding:11px 14px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
  .loc{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:650;letter-spacing:.2px}
  .loc .pin{width:9px;height:9px;border-radius:50%;background:var(--now);
    box-shadow:0 0 0 0 rgba(55,214,239,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,214,239,.55)}70%{box-shadow:0 0 0 9px rgba(55,214,239,0)}100%{box-shadow:0 0 0 0 rgba(55,214,239,0)}}
  .coords{font-family:var(--mono);font-size:11px;color:var(--tx3);margin-left:auto}
  .verdict{margin-top:8px;font-family:var(--mono);font-size:13px;line-height:1.45;color:var(--tx2)}
  .verdict b{color:var(--tx);font-weight:600}
  .verdict .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

  /* 底部控制 */
  .ctrl{position:fixed;left:0;right:0;bottom:0;z-index:1000;padding:0 12px max(12px,env(safe-area-inset-bottom));
    display:flex;justify-content:center;pointer-events:none}
  .ctrlcard{pointer-events:auto;width:100%;max-width:520px;background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);
    border-radius:18px;padding:12px 14px 13px;box-shadow:0 -8px 30px rgba(0,0,0,.45)}
  .frameline{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
  .ftime{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:.5px}
  .ftag{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.4px}
  .ftag.past{color:#b9c6dd;background:rgba(120,140,170,.18);border:1px solid #3a496a}
  .ftag.live{color:#04222a;background:var(--now)}
  .ftag.fore{color:#2a1c00;background:var(--fore)}
  .fwhen{font-family:var(--mono);font-size:12px;color:var(--tx3);margin-left:auto}

  /* 時間軸：過去 | 現在 | 預報 */
  .track{position:relative;height:30px;margin:2px 2px 0}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:30px;background:transparent;margin:0;position:relative;z-index:3}
  input[type=range]:focus{outline:none}
  input[type=range]:focus-visible::-webkit-slider-thumb{box-shadow:0 0 0 3px rgba(55,214,239,.5)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
    background:#fff;border:3px solid var(--now);margin-top:-9px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--now);cursor:pointer}
  .rail{position:absolute;left:2px;right:2px;top:13px;height:4px;border-radius:3px;
    background:linear-gradient(90deg,#34425e 0 var(--split,70%),rgba(246,167,35,.35) var(--split,70%) 100%);z-index:1}
  .nowmark{position:absolute;top:6px;width:2px;height:18px;background:var(--now);left:var(--split,70%);z-index:2;border-radius:2px}
  .rlabels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:1px;padding:0 2px}

  .buttons{display:flex;align-items:center;gap:10px;margin-top:11px}
  .play{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border-radius:13px;border:none;
    background:var(--now);color:#042027;font-weight:750;font-size:15px;font-family:var(--sans);cursor:pointer}
  .play:active{transform:translateY(1px)}
  .step{width:44px;height:44px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.04);
    color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .step:active{transform:translateY(1px)}

  .legend{display:flex;align-items:center;gap:4px;margin-top:11px;font-family:var(--mono);font-size:10px;color:var(--tx3);flex-wrap:wrap}
  .legend .sw{height:9px;border-radius:2px;flex:1;min-width:14px}
  .legend .txt{white-space:nowrap}

  /* 浮動按鈕：回到定位 */
  .fab{position:fixed;right:12px;z-index:1000;bottom:calc(192px + env(safe-area-inset-bottom));
    width:46px;height:46px;border-radius:14px;background:var(--panel-solid);border:1px solid var(--line);
    color:var(--now);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .fab:active{transform:translateY(1px)}

  .credit{position:fixed;left:12px;z-index:1000;bottom:calc(192px + env(safe-area-inset-bottom));
    font-family:var(--mono);font-size:10px;color:var(--tx3);background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:4px 8px}
  .credit a{color:var(--tx2);text-decoration:none}

  /* 覆蓋層：載入 / 錯誤 */
  .overlay{position:fixed;inset:0;z-index:2000;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:28px}
  .overlay .box{max-width:340px;text-align:center}
  .overlay h1{font-size:19px;margin:0 0 8px;font-weight:700}
  .overlay p{font-size:14px;color:var(--tx2);line-height:1.6;margin:0 0 18px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--now);border-radius:50%;
    margin:0 auto 16px;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .retry{height:42px;padding:0 20px;border-radius:12px;border:none;background:var(--now);color:#042027;font-weight:700;font-size:15px;cursor:pointer}
  .hidden{display:none!important}

  .leaflet-control-zoom{display:none}
  .leaflet-bar a{background:var(--panel-solid);color:var(--tx);border-color:var(--line)}
  .me-dot{width:16px;height:16px;border-radius:50%;background:var(--now);border:3px solid #fff;box-shadow:0 0 0 6px rgba(55,214,239,.25),0 2px 6px rgba(0,0,0,.6)}

  @media (prefers-reduced-motion:reduce){.loc .pin{animation:none}.spinner{animation-duration:2s}}
</style>
</head>
<body>
<div id="map"></div>

<div class="top">
  <div class="topcard">
    <div class="loc"><span class="pin"></span><span id="locName">定位中…</span><span class="coords" id="coords"></span></div>
    <div class="verdict" id="verdict">讀取雷達回波…</div>
  </div>
</div>

<div class="credit">雷達 © <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a></div>
<button class="fab" id="recenter" aria-label="回到我的位置" title="回到我的位置">◎</button>

<div class="ctrl">
  <div class="ctrlcard">
    <div class="frameline">
      <span class="ftime" id="ftime">--:--</span>
      <span class="ftag past" id="ftag">—</span>
      <span class="fwhen" id="fwhen"></span>
    </div>
    <div class="track">
      <div class="rail" id="rail"></div>
      <div class="nowmark" id="nowmark"></div>
      <input type="range" id="slider" min="0" max="0" value="0" step="1" aria-label="雷達時間">
    </div>
    <div class="rlabels"><span>過去 2 小時</span><span id="lblNow">現在</span><span>預報</span></div>
    <div class="buttons">
      <button class="step" id="prev" aria-label="上一格">‹</button>
      <button class="play" id="play"><span id="playIcon">▶</span><span id="playTxt">播放</span></button>
      <button class="step" id="next" aria-label="下一格">›</button>
    </div>
    <div class="legend">
      <span class="txt">弱</span>
      <span class="sw" style="background:#00b3ff"></span>
      <span class="sw" style="background:#00d56a"></span>
      <span class="sw" style="background:#f7e400"></span>
      <span class="sw" style="background:#ff8a00"></span>
      <span class="sw" style="background:#ff2d2d"></span>
      <span class="txt">強</span>
      <span class="txt" style="margin-left:8px;color:var(--tx2)">看你位置標記下方的顏色，往哪移動</span>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="box">
    <div class="spinner" id="ovSpin"></div>
    <h1 id="ovTitle">取得你的位置</h1>
    <p id="ovText">需要定位權限才能顯示你頭上的雷達。請允許定位。</p>
    <button class="retry hidden" id="ovBtn">重試</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function(){
  "use strict";
  var RV_API="https://api.rainviewer.com/public/weather-maps.json";
  var COLOR=4, SIZE=256, SMOOTH=1, SNOW=1; // RainViewer 色階 4，平滑
  var map, meMarker, frames=[], layers=[], idx=0, playing=false, timer=null, refresh=null, me=null;

  var $=function(id){return document.getElementById(id)};
  function pad(n){return (n<10?"0":"")+n}
  function hhmm(unix){var d=new Date(unix*1000);return pad(d.getHours())+":"+pad(d.getMinutes())}

  function fail(title,text,retry){
    $("ovSpin").classList.add("hidden");
    $("ovTitle").textContent=title; $("ovText").textContent=text;
    var b=$("ovBtn"); b.classList.remove("hidden"); b.onclick=retry;
    $("overlay").classList.remove("hidden");
  }
  function hideOverlay(){ $("overlay").classList.add("hidden"); }

  function initMap(lat,lon){
    map=L.map("map",{zoomControl:false,attributionControl:false,minZoom:5,maxZoom:12}).setView([lat,lon],8);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {subdomains:"abcd",maxZoom:19,detectRetina:true}).addTo(map);
    var icon=L.divIcon({className:"",html:'<div class="me-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
    meMarker=L.marker([lat,lon],{icon:icon,interactive:false,zIndexOffset:1000}).addTo(map);
    map.createPane("radar"); map.getPane("radar").style.zIndex=350;
  }

  function buildFrames(data){
    var host=data.host, r=data.radar||{};
    var past=(r.past||[]).map(function(f){return {time:f.time,path:f.path,kind:"past"}});
    var now=(r.nowcast||[]).map(function(f){return {time:f.time,path:f.path,kind:"fore"}});
    frames=past.concat(now);
    if(past.length) frames[past.length-1].kind="live"; // 最後一格實測 = 現在
    // 清掉舊圖層
    layers.forEach(function(L_){ if(L_) map.removeLayer(L_); });
    layers=frames.map(function(f){
      return L.tileLayer(host+f.path+"/"+SIZE+"/{z}/{x}/{y}/"+COLOR+"/"+SMOOTH+"_"+SNOW+".png",
        {tileSize:SIZE,opacity:0,pane:"radar",crossOrigin:false,updateWhenZooming:false,
         maxNativeZoom:7,maxZoom:12}); // RainViewer 圖磚最高 zoom 7，超過則放大顯示
    });
    layers.forEach(function(L_){ L_.addTo(map); });

    // 時間軸：現在分隔點位置
    var liveAt = past.length? (past.length-1) : 0;
    var split = frames.length>1 ? (liveAt/(frames.length-1))*100 : 100;
    document.documentElement.style.setProperty("--split", split.toFixed(1)+"%");
    $("slider").max = String(frames.length-1);
    // 預設停在「現在」
    show(liveAt);
  }

  function show(i){
    if(!frames.length) return;
    i=Math.max(0,Math.min(frames.length-1,i)); idx=i;
    layers.forEach(function(L_,k){ if(L_) L_.setOpacity(k===i?0.72:0); });
    var f=frames[i];
    $("ftime").textContent=hhmm(f.time);
    $("slider").value=String(i);
    var tag=$("ftag");
    tag.className="ftag "+(f.kind==="live"?"live":f.kind==="fore"?"fore":"past");
    tag.textContent=f.kind==="live"?"現在 · 實測":f.kind==="fore"?"預報":"過去";
    var diffMin=Math.round((f.time - Date.now()/1000)/60);
    $("fwhen").textContent = f.kind==="live" ? "剛剛觀測"
      : (diffMin>=0?("+"+diffMin+" 分（推估）"):(diffMin+" 分"));
    updateVerdict();
  }

  function updateVerdict(){
    var live=null; for(var k=0;k<frames.length;k++){ if(frames[k].kind==="live") live=frames[k]; }
    var hasFore=frames.some(function(f){return f.kind==="fore"});
    var html='<span class="dot" style="background:var(--now)"></span>'
      +'最新雷達 <b>'+(live?hhmm(live.time):"--:--")+'</b> 觀測。';
    if(hasFore) html+=' 拖到右邊看未來推估的雨往哪走。';
    html+='<br><span style="color:var(--tx3)">雷達是「真的雨」；右側預報段最多到約 30 分後。</span>';
    $("verdict").innerHTML=html;
  }

  function play(){ if(!frames.length) return; playing=true; $("playIcon").textContent="❚❚"; $("playTxt").textContent="暫停";
    clearInterval(timer);
    timer=setInterval(function(){ var n=idx+1; if(n>=frames.length) n=0; show(n); }, 480);
  }
  function pause(){ playing=false; $("playIcon").textContent="▶"; $("playTxt").textContent="播放"; clearInterval(timer); }
  function toggle(){ playing?pause():play(); }

  function loadRadar(){
    fetch(RV_API,{cache:"no-store"}).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status); return r.json();
    }).then(function(data){
      buildFrames(data); hideOverlay();
    }).catch(function(e){
      fail("雷達讀取失敗","連不上雷達服務，稍後重試。("+e.message+")",function(){ $("overlay").classList.add("hidden"); start(); });
    });
  }

  function gotPosition(pos){
    me={lat:pos.coords.latitude,lon:pos.coords.longitude};
    $("coords").textContent=me.lat.toFixed(3)+", "+me.lon.toFixed(3);
    $("locName").textContent="你的位置";
    if(!map){ initMap(me.lat,me.lon); } else { meMarker.setLatLng([me.lat,me.lon]); map.setView([me.lat,me.lon],map.getZoom()); }
    loadRadar();
    clearInterval(refresh); refresh=setInterval(loadRadar, 5*60*1000); // 每 5 分鐘更新雷達
  }
  function geoError(err){
    var msg = err && err.code===1 ? "你拒絕了定位權限。請到瀏覽器設定允許此頁定位，再重試。"
            : "拿不到定位（可能室內訊號弱）。到戶外或開啟高精準度定位，再重試。";
    fail("無法取得定位",msg,start);
  }

  function start(){
    $("overlay").classList.remove("hidden");
    $("ovSpin").classList.remove("hidden"); $("ovBtn").classList.add("hidden");
    $("ovTitle").textContent="取得你的位置"; $("ovText").textContent="需要定位權限才能顯示你頭上的雷達。請允許定位。";
    if(!("geolocation" in navigator)){ fail("此裝置不支援定位","換一支支援 GPS 的裝置，或用支援定位的瀏覽器。",start); return; }
    navigator.geolocation.getCurrentPosition(gotPosition, geoError, {enableHighAccuracy:true,timeout:12000,maximumAge:60000});
  }

  // 控制
  $("play").onclick=toggle;
  $("prev").onclick=function(){ pause(); show(idx-1); };
  $("next").onclick=function(){ pause(); show(idx+1); };
  $("slider").oninput=function(){ pause(); show(parseInt(this.value,10)||0); };
  $("recenter").onclick=function(){ if(map&&me) map.setView([me.lat,me.lon], Math.min(Math.max(map.getZoom(),8),9)); };

  start();
})();
</script>
</body>
</html>
