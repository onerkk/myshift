<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理後台 / Admin Panel</title>
<style>body{font-family:system-ui;padding:40px;text-align:center;color:#444}</style>
</head>
<body>
<p>正在前往管理後台 / Redirecting to admin panel...</p>
<p><a id="lnk" href="./admin/">點此繼續 / Tap to continue</a></p>
<script>
(function(){
  var target = location.origin + '/myshift/admin/';
  document.getElementById('lnk').href = target;
  try {
    if (window.top && window.top !== window) {
      window.top.location.href = target;
    } else {
      window.location.replace(target);
    }
  } catch(e) {
    window.location.replace(target);
  }
})();
</script>
</body>
</html>
