@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f0f0;--card:#fff;--pri:#00897b;--pri-d:#00695c;--pri-l:rgba(0,137,123,.08);--amber:#e68a00;--amber-l:rgba(230,138,0,.06);--green:#2e7d32;--green-l:rgba(46,125,50,.06);--red:#c62828;--red-l:rgba(198,40,40,.05);--tx:#111;--tx2:#555;--tx3:#999;--r:6px;--sh:0 1px 2px rgba(0,0,0,.05)}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',system-ui,sans-serif;max-width:430px;margin:0 auto;-webkit-user-select:none;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}

#splash::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.35)}
#splash img{width:72px;border-radius:16px;position:relative;z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#splash h1{font-size:22px;font-weight:900;color:#fff;margin-top:12px;position:relative;z-index:1;text-shadow:0 2px 6px rgba(0,0,0,.4)}
#splash p{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;position:relative;z-index:1}

/* Header */
.top{position:sticky;top:0;z-index:20;background:var(--pri);color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.top-left{display:flex;align-items:center;gap:6px}
.top-logo{width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,.2)}
.top-info h1{font-size:14px;font-weight:800;line-height:1}
.top-info span{font-size:9px;color:rgba(255,255,255,.5)}
.top-actions{display:flex;gap:3px}
.top-btn{height:26px;padding:0 8px;border-radius:5px;background:rgba(255,255,255,.15);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center}
.top-btn:active{background:rgba(255,255,255,.3)}
.top-btn.accent{background:rgba(255,255,255,.9);color:var(--pri-d)}

/* Setup page */
.page{padding:10px 10px 100px}
.hero{text-align:center;padding:24px 0 14px}
.hero img{width:52px;height:52px;border-radius:13px;box-shadow:var(--sh)}
.hero h1{font-size:18px;font-weight:900;margin-top:8px;color:var(--pri-d)}
.hero p{font-size:10px;color:var(--tx3);margin-top:2px}
.rcard{background:var(--card);border-left:3px solid var(--pri);border-radius:var(--r);padding:12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.rcard:active{background:#fafafa}
.rcard-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.rcard[data-k="2on2off"] .rcard-icon{background:var(--pri)}
.rcard[data-k="4on2off"] .rcard-icon{background:#5c6bc0}
.rcard[data-k="5on_mixed"] .rcard-icon{background:var(--amber)}
.rcard-info{flex:1}.rcard-name{font-size:13px;font-weight:800}.rcard-sub{font-size:9px;color:var(--tx3)}
.rcard-arrow{color:var(--tx3)}
.al-setup{margin-top:8px;background:var(--card);border-left:3px solid var(--green);border-radius:var(--r);padding:10px;box-shadow:var(--sh)}
.al-setup h3{font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px}
.al-setup-row{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.al-setup-row label{font-size:10px;color:var(--tx2);font-weight:600;width:68px}
.al-setup-row input{flex:1;padding:7px;border-radius:5px;border:1px solid #ddd;font-size:13px;font-weight:600;text-align:center}
.al-setup-hint{font-size:8px;color:var(--tx3);text-align:center}

/* Wizard */
.wiz-top{display:flex;align-items:center;gap:8px;padding:12px 0}
.wiz-back{width:36px;height:36px;border-radius:var(--r);background:var(--card);border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx2)}
.wiz-info{flex:1}.wiz-step{font-size:9px;color:var(--pri);font-weight:700}.wiz-q{font-size:15px;font-weight:800;margin-top:2px}
.wiz-badge{font-size:9px;color:var(--tx3);background:var(--card);border:1px solid #ddd;padding:2px 7px;border-radius:5px;font-weight:700}
.opts{display:grid;gap:5px}.opts.c2{grid-template-columns:1fr 1fr}.opts.c3{grid-template-columns:1fr 1fr 1fr}
.opt-btn{padding:12px 4px;border-radius:var(--r);text-align:center;font-weight:700;font-size:12px;border:1.5px solid #ddd;background:var(--card)}
.opt-btn:active{border-color:var(--pri)}
.opt-btn img{width:26px;height:26px;border-radius:5px;margin:0 auto 2px;display:block}

/* Month nav */
.mnav{display:flex;align-items:center;justify-content:space-between;padding:8px 0 2px}
.mnav-btn{width:32px;height:32px;border-radius:var(--r);background:var(--card);border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--pri)}
.mnav-title{font-size:16px;font-weight:900}

/* Weekday header */
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);padding:5px 2px 3px;background:var(--pri-d);border-radius:var(--r) var(--r) 0 0}
.wk-cell{text-align:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.8);padding:3px 0}
.wk-cell.we{color:#ffab91}

/* Calendar grid - BIG cells with shift name */
.cal{display:grid;grid-template-columns:repeat(7,1fr);padding:1px 2px 2px;gap:1px;background:var(--card);border-radius:0 0 var(--r) var(--r);box-shadow:var(--sh)}
.day{aspect-ratio:.85;border-radius:3px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:1px solid transparent}
.day:active{opacity:.8}
.day .ico{display:none}
.day .num{font-size:16px;font-weight:900;line-height:1}
.day .sn{font-size:9px;font-weight:700;line-height:1}
/* Shift colors - vibrant like reference */
.day.e{background:#b2ebf2;border-color:#80deea;color:#006064}
.day.e .sn{color:#00838f}
.day.n{background:#e1bee7;border-color:#ce93d8;color:#4a148c}
.day.n .sn{color:#6a1b9a}
.day.m{background:#fff9c4;border-color:#fff176;color:#f57f17}
.day.m .sn{color:#f9a825}
.day.o{background:#fff;border-color:#e0e0e0;color:#bbb}
.day.o .sn{color:#ccc}
.day.today{border:2px solid var(--pri)!important;box-shadow:0 0 0 1px var(--pri)}
.day .td{position:absolute;top:0;right:1px;font-size:5px;font-weight:800;color:var(--pri)}
.day.has-ev{border-color:var(--amber)!important;border-width:2px}
.day .evb{position:absolute;top:-3px;right:-3px;min-width:12px;height:12px;border-radius:3px;background:var(--red);color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:3}
.day .hol-dot{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--red)}
.day .al-dot{position:absolute;bottom:1px;right:2px;width:3px;height:3px;border-radius:50%;background:var(--green)}

/* Holiday strip */
.hol-strip{margin:4px 0 0;padding:5px 8px;background:var(--red-l);border-left:3px solid var(--red);border-radius:3px;font-size:9px;color:var(--red);font-weight:600}

/* Reminders */
.rem-sec{margin:4px 0 0}
.rem-title{font-size:10px;font-weight:700;color:var(--amber);margin-bottom:3px}
.rem-list{display:flex;flex-direction:column;gap:2px}
.rem-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;background:var(--card);border-left:3px solid var(--amber);box-shadow:var(--sh)}
.rem-date{min-width:30px;height:30px;border-radius:5px;background:var(--amber-l);display:flex;flex-direction:column;align-items:center;justify-content:center}
.rem-date .d{font-size:13px;font-weight:800;color:var(--amber);line-height:1}
.rem-date .w{font-size:7px;color:var(--tx3)}
.rem-info{flex:1}.rem-name{font-size:10px;font-weight:700}.rem-shift{font-size:8px;color:var(--tx3)}

/* Stats dashboard */
.dash{margin:4px 0 0;display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid #eee}
.dash-item{padding:7px 2px;text-align:center;border-right:1px solid #f0f0f0}
.dash-item:last-child{border-right:none}
.dash-val{font-size:16px;font-weight:900}.dash-lbl{font-size:8px;color:var(--tx3);font-weight:600}
.dash-val.e{color:#006064}.dash-val.n{color:#4a148c}.dash-val.m{color:#f57f17}.dash-val.o{color:#999}.dash-val.w{color:var(--tx)}

/* Hours card */
.hours-card{margin:3px 0;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid #eee;overflow:hidden}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #f5f5f5}
.hours-row:last-child{border-bottom:none}
.hours-label{font-size:11px;color:var(--tx2);font-weight:600}
.hours-val{font-size:14px;font-weight:800;color:var(--pri-d)}
.hours-val.ot{color:var(--red);font-size:16px}

/* AL bar */
.al-bar{margin:3px 0;background:var(--green-l);border:1px solid rgba(46,125,50,.1);border-left:3px solid var(--green);border-radius:3px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center}
.al-bar-label{font-size:10px;color:var(--green);font-weight:700}
.al-bar-val{font-size:14px;font-weight:800;color:var(--green)}

/* Weather */
.wx-card{margin:3px 0;background:var(--card);border-radius:var(--r);padding:8px 10px;box-shadow:var(--sh);border:1px solid #eee}
.wx-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.wx-now{display:flex;align-items:center;gap:6px}
.wx-now-icon{font-size:22px}.wx-now-temp{font-size:20px;font-weight:900}.wx-now-desc{font-size:9px;color:var(--tx2);font-weight:600}
.wx-loc{font-size:8px;color:var(--tx3)}
.wx-fc{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.wx-fc::-webkit-scrollbar{display:none}
.wx-day{flex:0 0 auto;width:44px;text-align:center;padding:4px 2px;border-radius:3px;background:#fafafa;border:1px solid #eee}
.wx-day.today{background:var(--pri-l);border-color:rgba(0,137,123,.15)}
.wx-day-name{font-size:7px;font-weight:700;color:var(--tx3)}
.wx-day-icon{font-size:13px;margin:1px 0}
.wx-day-hi{font-size:10px;font-weight:800}.wx-day-lo{font-size:8px;color:var(--tx3)}
.wx-loading{text-align:center;font-size:10px;color:var(--tx3);padding:4px}
.wx-err{text-align:center;font-size:10px;color:var(--tx3);padding:4px}
.wx-err button{color:var(--pri);font-weight:700;font-size:10px}

.lang-tog{display:flex;border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.25);height:26px}
.lt-btn{padding:0 8px;font-size:10px;font-weight:800;color:rgba(255,255,255,.5);background:transparent;transition:all .15s}
.lt-btn:active{opacity:.8}
.lt-btn.lt-on{background:rgba(255,255,255,.9);color:var(--pri-d)}

/* Install bar */
.install-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:5px 8px;padding-bottom:calc(5px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,var(--bg) 30%);z-index:30}
.install-card{background:var(--card);border:1px solid #ddd;border-radius:var(--r);padding:8px;display:flex;align-items:center;gap:6px;box-shadow:var(--sh)}
.install-icon{width:30px;height:30px;border-radius:7px;box-shadow:var(--sh)}.install-info{flex:1}
.install-title{font-size:10px;font-weight:700;color:var(--pri-d)}.install-sub{font-size:8px;color:var(--tx3)}
.install-btn{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;background:var(--pri);color:#fff}
.install-x{width:18px;height:18px;border-radius:3px;background:var(--pri-l);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--tx3)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
.modal-sheet{width:100%;max-width:430px;background:var(--card);border-radius:10px 10px 0 0;padding:12px;padding-bottom:calc(14px + env(safe-area-inset-bottom));animation:slideUp .2s ease;max-height:85dvh;overflow-y:auto}
.modal-handle{width:26px;height:3px;border-radius:2px;background:#ddd;margin:0 auto 8px}
.modal-title{font-size:15px;font-weight:800;text-align:center}
.modal-date{font-size:9px;color:var(--tx3);text-align:center;margin:2px 0 8px}
.modal-shift{padding:7px 10px;border-radius:5px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.modal-shift img{width:20px;height:20px;border-radius:4px}
.modal-shift-name{font-size:12px;font-weight:700}
.modal-divider{height:1px;background:#eee;margin:5px 0 8px}
.modal-section{font-size:9px;color:var(--tx3);font-weight:700;margin-bottom:5px}
.ev-list{display:flex;flex-direction:column;gap:2px}
.ev-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:5px;background:#fafafa;border:1.5px solid #eee}
.ev-item:active{background:#f5f5f5}
.ev-item.on{border-color:var(--pri);background:var(--pri-l)}
.ev-emoji{font-size:16px}.ev-name{font-size:11px;font-weight:700;flex:1}
.ev-check{width:18px;height:18px;border-radius:4px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900}
.ev-item.on .ev-check{background:var(--pri);border-color:var(--pri);color:#fff}
.al-pick{margin-top:5px;padding:8px;border-radius:5px;background:var(--green-l);border:1px solid rgba(46,125,50,.1)}
.al-pick label{font-size:9px;color:var(--green);font-weight:700;display:block;margin-bottom:3px}
.al-pick select{width:100%;padding:7px;border-radius:5px;border:1px solid rgba(46,125,50,.12);background:var(--card);font-size:12px;font-weight:600}
.modal-alarm{margin-top:6px;width:100%;padding:8px;border-radius:5px;text-align:center;font-size:10px;font-weight:700;background:var(--pri-l);color:var(--pri-d);display:flex;align-items:center;justify-content:center;gap:3px}
.modal-done{margin-top:5px;width:100%;padding:8px;border-radius:5px;background:var(--pri);font-size:12px;font-weight:700;text-align:center;color:#fff}
.help-step{display:flex;gap:6px;margin-bottom:8px}.help-num{min-width:20px;height:20px;border-radius:4px;background:var(--pri);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}.help-txt h3{font-size:11px;font-weight:700;margin-bottom:1px}.help-txt p{font-size:9px;color:var(--tx2);line-height:1.3}

function sAL(){const a=JSON.stringify(AL),d=JSON.stringify(ALD);try{localStorage.setItem("sb_al2",a);localStorage.setItem("sb_ald",d)}catch(e){}try{sCk("sb_al2",a,3650);sCk("sb_ald",d,3650)}catch(e){}}
function alUsed(){const ay=curALY();const a=AL[ay]||{};let s=a.used||0;const start=`${ay}-12-26`,end=`${ay+1}-12-25`;for(let k in ALD){if(k>=start&&k<=end)s+=ALD[k]}return s}
function alRem(){const a=getAL();return Math.max(0,(a.total||0)-alUsed())}
let DP=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();DP=e;render()});
function sCk(k,v,d){const e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=k+"="+encodeURIComponent(v)+";expires="+e.toUTCString()+";path=/;SameSite=Lax"}
function gCk(k){const m=document.cookie.match(new RegExp('(?:^|; )'+k+'=([^;]*)'));return m?decodeURIComponent(m[1]):null}
try{const c=JSON.parse(localStorage.getItem("sb_c"))||JSON.parse(gCk("sb_c"));if(c&&c.rt&&c.pos!==null&&c.pos!==undefined){S.rt=c.rt;S.pos=c.pos;S.step="cal"}}catch(e){}
function sv(){const d=JSON.stringify({rt:S.rt,pos:S.pos});try{localStorage.setItem("sb_c",d)}catch(e){}sCk("sb_c",d,3650)}
function rot(){return S.rt?R[S.rt]:null}
function cyc(){return rot()?rot().c:[]}
function dim(y,m){return new Date(y,m,0).getDate()}
function fdw(y,m){return new Date(y,m-1,1).getDay()}
function gs(y,m,d){const c=cyc();if(!c.length||S.pos===null)return null;let p=(S.pos+Math.round((new Date(y,m-1,d)-TR)/864e5))%c.length;if(p<0)p+=c.length;return c[p]}
function ek(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function hk(m,d){return`${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function gh(m,d){const h=HOL[hk(m,d)];if(!h)return null;return h[lang]||null}
function en(id){return t(id)}
function calcOT(y,m,wd,sh){const dm=dim(y,m);let wdays=0;for(let d=1;d<=dm;d++){const dw=new Date(y,m-1,d).getDay();if(dw>=1&&dw<=5)wdays++}let hwd=0;for(let d=1;d<=dm;d++){const dw=new Date(y,m-1,d).getDay();if(dw>=1&&dw<=5&&HOL[hk(m,d)])hwd++}const rH=(wdays-hwd)*8;const tH=wd*sh;return{tH,oH:sh===12?wd*4:Math.max(0,tH-rH),rH}}
setTimeout(()=>{const sp=document.getElementById("splash");if(sp)sp.remove()},2600);

function render(){
  const a=document.getElementById("app");
  if(S.step==="type")a.innerHTML=rType();
  else if(S.step==="wiz")a.innerHTML=rWiz();
  else a.innerHTML=rCal();
  document.getElementById("mr").innerHTML=S.modal?rMod():S.showH?rHelp():"";
  document.querySelectorAll("[data-a]").forEach(el=>{el.onclick=handle});
}

function rType(){

  ${Object.entries(R).map(([k,v],i)=>`<button class="rcard fu d${i+1}" data-a="pick" data-k="${k}"><div class="rcard-icon">${k==="2on2off"?"2:2":k==="4on2off"?"4:2":"5:1"}</div><div class="rcard-info"><div class="rcard-name">${RN[lang][k]}</div><div class="rcard-sub">${v.h===12?t("s12"):t("s8")} · ${v.c.length}${t("cyc")}</div></div><div class="rcard-arrow">›</div></button>`).join("")}
  <div class="al-setup fu d3"><h3>${t("alSetup")}</h3><div class="al-setup-hint" style="margin-bottom:8px;font-size:11px;color:var(--green);font-weight:600">${alYRange(curALY())}</div><div class="al-setup-row"><label>${t("alTotal")}</label><input type="number" id="alTI" value="${getAL().total||''}" placeholder="0" min="0" step="0.5"></div><div class="al-setup-row"><label>${t("alUsed")}</label><input type="number" id="alUI" value="${getAL().used||''}" placeholder="0" min="0" step="0.5"></div><div class="al-setup-hint">${t("alSkip")}</div></div>

}

function rWiz(){
  const c=cyc();
  if(!S.wT)return wS(t("q1"),"1/3",`<div class="opts c2"><button class="opt-btn" data-a="wt" data-v="w"><img class="oi" src="${IMG.early}">${t("work")}</button><button class="opt-btn" data-a="wt" data-v="o"><img class="oi" src="${IMG.off}">${t("off")}</button></div>`);
  if(S.wT==="w"&&!S.wS){const sh=[...new Set(c.filter(x=>x!=="休"))];return wS(t("q2w"),"2/3",`<div class="opts ${sh.length===3?'c3':'c2'}">${sh.map(s=>`<button class="opt-btn" data-a="ws" data-v="${s}"><img class="oi" src="${SI[s]}">${sf(s)}</button>`).join("")}</div>`);}
  if(S.wT==="o"&&!S.wN){const sh=[...new Set(c.filter(x=>x!=="休"))];return wS(t("q2o"),"2/3",`<div class="opts ${sh.length===3?'c3':'c2'}">${sh.map(s=>`<button class="opt-btn" data-a="wn" data-v="${s}"><img class="oi" src="${SI[s]}">→${sf(s)}</button>`).join("")}</div>`);}
  if(S.wT==="w"&&S.wS&&S.wD===null){let mx=0,cr=0;for(let i=0;i<c.length*2;i++){if(c[i%c.length]===S.wS){cr++;mx=Math.max(mx,cr)}else cr=0}return wS(t("q3w").replace("#s#",sf(S.wS)),"3/3",`<div class="opts c3">${Array.from({length:mx},(_,i)=>`<button class="opt-btn" data-a="wwd" data-v="${i+1}">${t("dn").replace("#n#",i+1)}</button>`).join("")}</div>`);}
  if(S.wT==="o"&&S.wN&&S.wD===null){let mx=0;for(let i=0;i<c.length;i++){if(c[i]!=="休")continue;let j=i;while(j<c.length&&c[j]==="休")j++;if(c[j%c.length]===S.wN)mx=Math.max(mx,j-i)}return wS(t("q3o"),"3/3",`<div class="opts ${mx<=4?'c2':'c3'}">${Array.from({length:mx},(_,i)=>`<button class="opt-btn" data-a="wod" data-v="${i+1}">${t("dn").replace("#n#",i+1)}</button>`).join("")}</div>`);}
  return"";
}
function wS(q,step,ct){return`<div class="page"><div class="wiz-top fu"><button class="wiz-back" data-a="wb">←</button><div class="wiz-info"><div class="wiz-step">STEP ${step}</div><div class="wiz-q">${q}</div></div><div class="wiz-badge">${RN[lang][S.rt]}</div></div><div class="fu d1">${ct}</div></div>`}

function rCal(){
  const r=rot(),c=cyc(),y=S.yr,m=S.mo,dm=dim(y,m),fd=fdw(y,m),ic=y===TY&&m===TM;
  const st={};for(let d=1;d<=dm;d++){const s=gs(y,m,d);if(s)st[s]=(st[s]||0)+1}
  const wk=Object.entries(st).filter(([s])=>s!=="休").reduce((a,[,v])=>a+v,0);
  const WK=t("wk");
  let cells="";for(let i=0;i<fd;i++)cells+=`<div></div>`;
  for(let d=1;d<=dm;d++){const s=gs(y,m,d),td=ic&&d===TD,hol=gh(m,d),ev=EVS[ek(y,m,d)]||[],he=ev.length>0,dayAL=ALD[ek(y,m,d)];
    cells+=`<div class="day ${SC[s]}${td?' today':''}${he?' has-ev':''}" data-a="open" data-d="${d}"><span class="num">${d}</span><span class="sn">${sf(s)}</span>${td?'<span class="td">TODAY</span>':''}${he?`<div class="evb">${ev.length}</div>`:''}${hol&&!he?'<span class="hol-dot"></span>':''}${dayAL?'<span class="al-dot"></span>':''}</div>`}
  const mh=[];for(let d=1;d<=dm;d++){const h=gh(m,d);if(h)mh.push(`${m}/${d} ${h}`)}
  let holH=mh.length?`<div class="hol-strip">🎌 ${mh.join("　")}</div>`:"";
  const rems=[];for(let d=1;d<=dm;d++){const evs=EVS[ek(y,m,d)];if(evs&&evs.length){const s=gs(y,m,d),dw=new Date(y,m-1,d).getDay();evs.forEach(eid=>rems.push({d,dw,shift:sf(s),eid}))}}
  let remH="";if(rems.length){remH=`<div class="rem-sec"><div class="rem-title">${t("rem")}</div><div class="rem-list">${rems.map(r=>`<div class="rem-item" data-a="open" data-d="${r.d}"><div class="rem-date"><div class="d">${r.d}</div><div class="w">${WK[r.dw]}</div></div><div class="rem-info"><div class="rem-name">${en(r.eid)}</div><div class="rem-shift">${r.shift}</div></div><div style="font-size:16px">${EE[r.eid]||"📌"}</div></div>`).join("")}</div></div>`}
  let chips=Object.entries(st).map(([s,n])=>`<div class="dash-item"><div class="dash-val ${SC[s]}">${n}</div><div class="dash-lbl">${sf(s)}</div></div>`).join("");
  chips+=`<div class="dash-item"><div class="dash-val w">${wk}</div><div class="dash-lbl">${t("workD")}</div></div>`;
  const ot=calcOT(y,m,wk,r.h);
  const hH=`<div class="hours-card fi"><div class="hours-row"><span class="hours-label">${t("reqH")}</span><span class="hours-val">${ot.rH}h</span></div><div class="hours-row"><span class="hours-label">${t("totalH")}</span><span class="hours-val">${ot.tH}h</span></div><div class="hours-row"><span class="hours-label">${t("otH")} 🔥</span><span class="hours-val ot">${ot.oH}h</span></div></div>`;
  const alH=getAL().total>0?`<div class="al-bar fi"><span class="al-bar-label">🌴 ${t("alRem")} (${alYRange(curALY())})</span><span class="al-bar-val">${alRem()} ${t("hr")}</span></div>`:"";
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent),showI=(!!DP||isIOS)&&!S.instH;
  let instH="";if(showI){instH=`<div class="install-wrap"><div class="install-card"><img class="install-icon" src="${IMG.icon}"><div class="install-info"><div class="install-title">${t("instT")}</div><div class="install-sub">${DP?t("instS"):t("instSi")}</div></div>${DP?`<button class="install-btn" data-a="inst">${t("instB")}</button>`:''}<button class="install-x" data-a="hideI">✕</button></div></div>`}
  const ml=lang==="zh"?`${y}年${m}月`:`${m}/${y}`;
  return`<div class="top"><div class="top-left"><img class="top-logo" src="${IMG.icon}"><div class="top-info"><h1>${t("app")}</h1><span>${RN[lang][S.rt]}</span></div></div><div class="top-actions"><button class="top-btn" data-a="today">${t("today")}</button><button class="top-btn" data-a="help">${t("help")}</button><span class="lang-tog"><button class="lt-btn${lang==='zh'?' lt-on':''}" data-a="lzh">中</button><button class="lt-btn${lang==='id'?' lt-on':''}" data-a="lid">ID</button></span><button class="top-btn" data-a="reset">${t("reset")}</button></div></div>
  <div class="mnav"><button class="mnav-btn" data-a="prev">◀</button><div class="mnav-title">${ml}</div><button class="mnav-btn" data-a="next">▶</button></div>
  <div class="wk-row">${WK.map((w,i)=>`<div class="wk-cell${i===0||i===6?' we':''}">${w}</div>`).join("")}</div>
  <div class="cal fi">${cells}</div>${holH}${remH}<div class="dash fi">${chips}</div>${rainWarnHtml()}${typeof wxHtml==='function'?wxHtml():''}${hH}${alH}
  <div style="height:${showI?'80':'12'}px"></div>${instH}`;
}

function rMod(){
  const{y,m,d}=S.modal,s=gs(y,m,d),hol=gh(m,d),ev=EVS[ek(y,m,d)]||[],dw=new Date(y,m-1,d).getDay();
  const WK=t("wk");const bg={"早":"var(--amber-l)","晚":"var(--sec-l)","中":"var(--amber-l)","休":"var(--green-l)"};
  let holL=hol?`<div style="padding:8px 10px;border-radius:8px;background:var(--red-l);margin-bottom:8px;font-size:11px;color:var(--red);font-weight:600">🎌 ${hol}</div>`:"";
  const evR=EI.map(id=>{const a=ev.includes(id);return`<button class="ev-item${a?' on':''}" data-a="tev" data-eid="${id}"><span class="ev-emoji">${EE[id]}</span><span class="ev-name">${en(id)}</span><div class="ev-check">${a?'✓':''}</div></button>`}).join("");
  const ds=lang==="zh"?`${m}月${d}日 週${WK[dw]}`:`${WK[dw]}, ${d}/${m}/${y}`;
  const hasAL=ev.includes("annualL");const dayAL=ALD[ek(y,m,d)]||0;
  let alP="";if(hasAL){let opts="";for(let h=0.5;h<=12;h+=0.5){opts+=`<option value="${h}"${h===dayAL?' selected':''}>${h} ${t("hr")}</option>`}alP=`<div class="al-pick"><label>🌴 ${t("alPick")} (${t("alRem")}: ${alRem()}${t("hr")})</label><select id="alSel" data-a="alh">${opts}</select></div>`}
  return`<div class="modal-bg" data-a="close"><div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div><div class="modal-title">${ds}</div><div class="modal-date">${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}</div>
  <div class="modal-shift" style="background:${bg[s]||'var(--pri-l)'}"><img src="${SI[s]}" style="width:28px;height:28px;border-radius:8px"><div class="modal-shift-name">${sf(s)}</div></div>${holL}<div class="modal-divider"></div><div class="modal-section">${t("mark")}</div><div class="ev-list">${evR}</div>${alP}
  <button class="modal-done" data-a="close">${t("done")}</button></div></div>`}

function rHelp(){
  const steps=t("h");
  return`<div class="modal-bg" data-a="closeH"><div class="modal-sheet" onclick="event.stopPropagation()"><div class="modal-handle"></div><div class="modal-title">${t("helpT")}</div><div style="height:12px"></div>
  ${steps.map((s,i)=>{const[title,desc]=s.split("|");return`<div class="help-step"><div class="help-num">${i+1}</div><div class="help-txt"><h3>${title}</h3><p>${desc}</p></div></div>`}).join("")}
  <button class="modal-done" data-a="closeH">${t("done")}</button></div></div>`}

function rW(sh,day){const c=cyc();for(let i=0;i<c.length;i++){if(c[i]!==sh)continue;let n=1;for(let j=i-1;j>=0;j--){if(c[j]===sh)n++;else break}if(n===day)return i}return 0}
function rO(nx,day){const c=cyc();for(let i=0;i<c.length;i++){if(c[i]!=="休")continue;let j=i;while(j<c.length&&c[j]==="休")j++;if(c[j%c.length]!==nx)continue;let n=1;for(let k=i-1;k>=0;k--){if(c[k]==="休")n++;else break}if(n===day)return i}return 0}

function handle(e){
  const el=e.currentTarget,a=el.dataset.a;
  switch(a){
    case "pick":{const ti=document.getElementById("alTI"),ui=document.getElementById("alUI");setAL(parseFloat(ti&&ti.value)||0,parseFloat(ui&&ui.value)||0);S.rt=el.dataset.k;S.step="wiz";S.wT=S.wS=S.wN=S.wD=null;break}
    case "wb":if(S.wD!==null)S.wD=null;else if(S.wS)S.wS=null;else if(S.wN)S.wN=null;else if(S.wT)S.wT=null;break;
    case "wt":S.wT=el.dataset.v==="w"?"w":"o";S.wD=null;S.wS=null;S.wN=null;break;
    case "ws":S.wS=el.dataset.v;S.wD=null;break;
    case "wn":S.wN=el.dataset.v;S.wD=null;break;
    case "wwd":S.wD=+el.dataset.v;S.pos=rW(S.wS,S.wD);S.step="cal";sv();break;
    case "wod":S.wD=+el.dataset.v;S.pos=rO(S.wN,S.wD);S.step="cal";sv();break;
    case "prev":if(S.mo===1){S.yr--;S.mo=12}else S.mo--;break;
    case "next":if(S.mo===12){S.yr++;S.mo=1}else S.mo++;break;
    case "today":S.yr=TY;S.mo=TM;break;
    case "reset":S.step="wiz";S.rt="4on2off";S.pos=null;S.wT=S.wS=S.wN=S.wD=null;try{localStorage.removeItem("sb_c")}catch(e){}break;
    case "open":S.modal={y:S.yr,m:S.mo,d:+el.dataset.d};break;
    case "close":S.modal=null;break;
    case "help":S.showH=true;break;
    case "closeH":S.showH=false;break;
    case "lzh":lang="zh";try{localStorage.setItem("sb_l",lang)}catch(e){}sCk("sb_l",lang,3650);break;
    case "lid":lang="id";try{localStorage.setItem("sb_l",lang)}catch(e){}sCk("sb_l",lang,3650);break;
    case "lang":lang=lang==="zh"?"id":"zh";try{localStorage.setItem("sb_l",lang)}catch(e){}break;
    case "tev":{const{y,m,d}=S.modal;const k=ek(y,m,d),eid=el.dataset.eid;if(!EVS[k])EVS[k]=[];const i=EVS[k].indexOf(eid);if(i>=0){EVS[k].splice(i,1);if(eid==="annualL")delete ALD[k]}else{EVS[k].push(eid);if(eid==="annualL"&&!ALD[k])ALD[k]=4}if(!EVS[k].length)delete EVS[k];sEv();sAL();break}
    case "alh":{const{y,m,d}=S.modal;const sel=document.getElementById("alSel");if(sel)ALD[ek(y,m,d)]=parseFloat(sel.value);sAL();return}
    case "inst":if(DP){DP.prompt();DP.userChoice.then(()=>{DP=null;render()})}break;
    case "hideI":S.instH=true;break;
    case "wxR":wxErr=false;wxData=null;render();loadWx();return;
  }
  render();
}
try{render();}catch(e){document.getElementById("app").innerHTML="<div style='padding:20px;color:red;font-size:14px;word-break:break-all'><b>ERROR:</b><br>"+e.message+"</div>";}






// ═══ WEATHER ═══
const WXI={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌧",55:"🌧",61:"🌧",63:"🌧️",65:"🌧️",71:"🌨",73:"🌨",75:"❄️",80:"🌦",81:"🌧",82:"⛈",95:"⛈"};
const WXZ={0:"晴天",1:"大致晴",2:"局部多雲",3:"多雲",45:"霧",48:"霧",51:"小雨",53:"中雨",55:"大雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"陣雨",81:"陣雨",82:"暴雨",95:"雷雨"};
const WXD={0:"Cerah",1:"Cerah",2:"Berawan",3:"Mendung",45:"Kabut",48:"Kabut",51:"Gerimis",53:"Hujan",55:"Hujan Lebat",61:"Hujan",63:"Hujan",65:"Hujan Lebat",71:"Salju",80:"Hujan",81:"Hujan",82:"Badai",95:"Petir"};
let wxData=null,wxErr=false;
async function loadWx(){
  try{
    const pos=await new Promise((ok,no)=>{navigator.geolocation.getCurrentPosition(ok,no,{timeout:8000,maximumAge:600000})});
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude.toFixed(2)}&longitude=${pos.coords.longitude.toFixed(2)}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&hourly=precipitation_probability&timezone=auto&forecast_days=7`;
    const data=await(await fetch(url)).json();
    wxData={temp:Math.round(data.current.temperature_2m),code:data.current.weather_code,
      days:data.daily.time.map((t,i)=>({date:t,code:data.daily.weather_code[i],hi:Math.round(data.daily.temperature_2m_max[i]),lo:Math.round(data.daily.temperature_2m_min[i])})),hTime:data.hourly.time,hPrec:data.hourly.precipitation_probability};
    wxErr=false;
  }catch(e){wxErr=true;wxData=null}
  render();
}

const SHIFT_HR={"早":[6,7,8],"中":[13,14,15],"晚":[18,19,20]};
function rainWarnHtml(){
  if(!wxData||!wxData.hPrec||S.step!=="cal")return"";
  const sh=gs(TY,TM,TD);if(!sh||sh==="休")return"";
  const hrs=SHIFT_HR[sh];if(!hrs)return"";
  const ds=`${TY}-${String(TM).padStart(2,"0")}-${String(TD).padStart(2,"0")}`;
  let mx=0;
  hrs.forEach(h=>{const k=ds+"T"+String(h).padStart(2,"0")+":00";const i=wxData.hTime.indexOf(k);if(i>=0&&wxData.hPrec[i]>mx)mx=wxData.hPrec[i]});
  if(mx<40)return"";
  const sn=lang==="zh"?{"早":"早班","中":"中班","晚":"晚班"}[sh]:{"早":"Pagi","中":"Siang","晚":"Malam"}[sh];
  const tr=`${String(hrs[0]).padStart(2,"0")}:00-${String(hrs[hrs.length-1]+1).padStart(2,"0")}:00`;
  const tip=lang==="zh"?`🌂 ${sn}出門注意！${tr} 降雨機率 ${mx}%，建議攜帶雨具`:`🌂 ${sn}: hujan ${mx}% (${tr}), bawa payung!`;
  const bg=mx>=70?"var(--red-l)":"var(--amber-l)",bc=mx>=70?"var(--red)":"var(--amber)",tc=mx>=70?"var(--red)":"#b36b00";
  return`<div class="rain-warn fi" style="margin:4px 0;padding:7px 10px;background:${bg};border-left:3px solid ${bc};border-radius:3px;font-size:10px;font-weight:600;color:${tc}">${tip}</div>`
}
function wxHtml(){
  if(wxErr)return`<div class="wx-card fi"><div class="wx-err">🌡️ <button data-a="wxR">${lang==="zh"?"載入天氣":"Muat Cuaca"}</button></div></div>`;
  if(!wxData)return`<div class="wx-card fi"><div class="wx-loading">🌡️ ${lang==="zh"?"載入天氣中...":"Memuat cuaca..."}</div></div>`;
  const d=wxData,wk=t("wk"),desc=lang==="zh"?WXZ:WXD;
  const fc=d.days.map((f,i)=>{const dt=new Date(f.date),dw=dt.getDay();
    return`<div class="wx-day${i===0?' today':''}"><div class="wx-day-name">${i===0?(lang==="zh"?"今天":"Hari ini"):wk[dw]}</div><div class="wx-day-icon">${WXI[f.code]||"🌡"}</div><div class="wx-day-hi">${f.hi}°</div><div class="wx-day-lo">${f.lo}°</div></div>`}).join("");
  return`<div class="wx-card fi"><div class="wx-head"><div class="wx-now"><div class="wx-now-icon">${WXI[d.code]||"🌡"}</div><div><div class="wx-now-temp">${d.temp}°C</div><div class="wx-now-desc">${desc[d.code]||""}</div></div></div><div class="wx-loc">${lang==="zh"?"7日天氣預報":"Prakiraan 7 Hari"}</div></div><div class="wx-fc">${fc}</div></div>`}
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist();
if(navigator.geolocation)loadWx();

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script></body></html>
